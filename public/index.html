<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Feed Hub — All reward sites in one place</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=7" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">⚡</span>
      <div>
        <h1>Live Feed Hub</h1>
        <p class="tagline">সব রিওয়ার্ড সাইটের লাইভ earn — এক জায়গায়</p>
      </div>
    </div>
    <div class="topbar-meta">
      <a class="admin-link" href="/admin.html">Admin</a>
      <span id="statusDot" class="status-dot" title="Connection"></span>
      <span id="statusText" class="status-text">Connecting…</span>
    </div>
  </header>

  <section class="ticker-section" aria-label="Live activity ticker">
    <div class="ticker-label">Live</div>
    <div class="ticker-track" id="tickerTrack">
      <div class="ticker-inner" id="tickerInner"></div>
    </div>
  </section>

  <main class="layout">
    <aside class="sidebar">
      <h2>Sources</h2>
      <div id="sourceFilters" class="source-filters"></div>
      <div id="sourceHealth" class="source-health"></div>
    </aside>

    <section class="feed-panel">
      <section class="top-offers-section" aria-label="Daily top offers">
        <div class="section-head">
          <h2>Daily top offers</h2>
          <span class="section-hint">প্রতি সাইট — বেশি coin এবং বেশি বার যা live ফিডে এসেছে</span>
        </div>
        <div id="topOffersGrid" class="top-offers-grid"></div>
      </section>

      <div class="feed-header">
        <h2>History</h2>
        <span id="feedCount" class="feed-count">0 events</span>
      </div>
      <ul id="feedList" class="feed-list"></ul>
      <nav id="pagination" class="pagination" aria-label="History pages"></nav>
    </section>
  </main>

  <footer class="footer">
    <p>Third-party public activity feeds. Not affiliated with listed sites. Data refreshes automatically.</p>
  </footer>

  <script src="/app.js?v=7" type="module"></script>
</body>
</html>
